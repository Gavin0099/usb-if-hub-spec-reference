matrix_id: usb_hub_class_request_matrix
scope:
  usb_versions:
    - usb20
  topic: class_specific_request
status: draft
# Phase 3B: GET_STATUS hub/port entries added.
# Phase 3C: SET_FEATURE / CLEAR_FEATURE hub/port entries added.
# Phase 3D: TT request family added. applies_to field introduced.
entries:

  - request_id: usb20_get_status_hub
    request_family: GET_STATUS
    request_name: GET_STATUS
    usb_version_scope:
      - usb20
    topic: class_specific_request
    recipient: hub
    applies_to: all_hubs
    setup:
      direction: device_to_host
      type: class
      recipient: device
      bRequest: GET_STATUS
      wValue: "0x0000"
      wIndex: "0x0000"
      wLength: 4
    source_refs:
      - usb20_spec
    section_anchor: "USB 2.0 Specification Rev 2.0 §11.24.2"
    authority_level: normative_official
    claim_level: inferred
    evidence_status: review_required
    drift_status: clean
    notes: >
      Returns wHubStatus (2 bytes) + wHubChange (2 bytes). Total wLength=4.
      bmRequestType=0xA0 (D7=1 D2H, D6:5=01 class, D4:0=00000 device).
      wIndex=0 (hub itself). Hub status bits defined separately in hub_status_matrix.

  - request_id: usb20_get_status_port
    request_family: GET_STATUS
    request_name: GET_STATUS
    usb_version_scope:
      - usb20
    topic: class_specific_request
    recipient: port
    applies_to: all_hubs
    setup:
      direction: device_to_host
      type: class
      recipient: other
      bRequest: GET_STATUS
      wValue: "0x0000"
      wIndex: port_number
      wLength: 4
    source_refs:
      - usb20_spec
    section_anchor: "USB 2.0 Specification Rev 2.0 §11.24.2"
    authority_level: normative_official
    claim_level: inferred
    evidence_status: review_required
    drift_status: clean
    notes: >
      Returns wPortStatus (2 bytes) + wPortChange (2 bytes). Total wLength=4.
      bmRequestType=0xA3 (D7=1 D2H, D6:5=01 class, D4:0=00011 other).
      wIndex=1-based port number. Port status/change bits defined separately
      in port_status_matrix (Phase 4A).

  - request_id: usb20_set_feature_hub
    request_family: SET_FEATURE
    request_name: SET_FEATURE
    usb_version_scope:
      - usb20
    topic: class_specific_request
    recipient: hub
    applies_to: all_hubs
    setup:
      direction: host_to_device
      type: class
      recipient: device
      bRequest: SET_FEATURE
      wValue: feature_selector
      wIndex: "0x0000"
      wLength: 0
    source_refs:
      - usb20_spec
    section_anchor: "USB 2.0 Specification Rev 2.0 §11.24.2"
    authority_level: normative_official
    claim_level: inferred
    evidence_status: review_required
    drift_status: clean
    notes: >
      bmRequestType=0x20 (D7=0 H2D, D6:5=01 class, D4:0=00000 device).
      wValue=feature_selector (hub feature selectors deferred to feature_selector_matrix).
      wIndex=0 (hub itself). wLength=0.

  - request_id: usb20_set_feature_port
    request_family: SET_FEATURE
    request_name: SET_FEATURE
    usb_version_scope:
      - usb20
    topic: class_specific_request
    recipient: port
    applies_to: all_hubs
    setup:
      direction: host_to_device
      type: class
      recipient: other
      bRequest: SET_FEATURE
      wValue: feature_selector
      wIndex: port_number
      wLength: 0
    source_refs:
      - usb20_spec
    section_anchor: "USB 2.0 Specification Rev 2.0 §11.24.2"
    authority_level: normative_official
    claim_level: inferred
    evidence_status: review_required
    drift_status: clean
    notes: >
      bmRequestType=0x23 (D7=0 H2D, D6:5=01 class, D4:0=00011 other).
      wValue=feature_selector (port feature selectors deferred to feature_selector_matrix).
      wIndex=1-based port number. wLength=0.

  - request_id: usb20_clear_feature_hub
    request_family: CLEAR_FEATURE
    request_name: CLEAR_FEATURE
    usb_version_scope:
      - usb20
    topic: class_specific_request
    recipient: hub
    applies_to: all_hubs
    setup:
      direction: host_to_device
      type: class
      recipient: device
      bRequest: CLEAR_FEATURE
      wValue: feature_selector
      wIndex: "0x0000"
      wLength: 0
    source_refs:
      - usb20_spec
    section_anchor: "USB 2.0 Specification Rev 2.0 §11.24.2"
    authority_level: normative_official
    claim_level: inferred
    evidence_status: review_required
    drift_status: clean
    notes: >
      bmRequestType=0x20 (D7=0 H2D, D6:5=01 class, D4:0=00000 device).
      wValue=feature_selector (hub feature selectors deferred to feature_selector_matrix).
      wIndex=0. wLength=0.

  - request_id: usb20_clear_feature_port
    request_family: CLEAR_FEATURE
    request_name: CLEAR_FEATURE
    usb_version_scope:
      - usb20
    topic: class_specific_request
    recipient: port
    applies_to: all_hubs
    setup:
      direction: host_to_device
      type: class
      recipient: other
      bRequest: CLEAR_FEATURE
      wValue: feature_selector
      wIndex: port_number
      wLength: 0
    source_refs:
      - usb20_spec
    section_anchor: "USB 2.0 Specification Rev 2.0 §11.24.2"
    authority_level: normative_official
    claim_level: inferred
    evidence_status: review_required
    drift_status: clean
    notes: >
      bmRequestType=0x23 (D7=0 H2D, D6:5=01 class, D4:0=00011 other).
      wValue=feature_selector (port feature selectors deferred to feature_selector_matrix).
      wIndex=1-based port number. wLength=0.

  - request_id: usb20_clear_tt_buffer
    request_family: CLEAR_TT_BUFFER
    request_name: CLEAR_TT_BUFFER
    usb_version_scope:
      - usb20
    topic: class_specific_request
    recipient: hub
    applies_to: hub_with_tt_only
    setup:
      direction: host_to_device
      type: class
      recipient: other
      bRequest: CLEAR_TT_BUFFER
      wValue: spec_defined
      wIndex: spec_defined
      wLength: 0
    source_refs:
      - usb20_spec
    section_anchor: "USB 2.0 Specification Rev 2.0 §11.24.2"
    authority_level: normative_official
    claim_level: inferred
    evidence_status: review_required
    drift_status: clean
    notes: >
      bmRequestType=0x23 (D7=0 H2D, D6:5=01 class, D4:0=00011 other).
      wValue carries endpoint address, device address, and endpoint type fields
      (deferred to TT buffer matrix — spec_defined until section-level review).
      wIndex carries TT port number / TT context (spec_defined).
      Only valid on HS hubs with an embedded Transaction Translator.

  - request_id: usb20_reset_tt
    request_family: RESET_TT
    request_name: RESET_TT
    usb_version_scope:
      - usb20
    topic: class_specific_request
    recipient: hub
    applies_to: hub_with_tt_only
    setup:
      direction: host_to_device
      type: class
      recipient: other
      bRequest: RESET_TT
      wValue: "0x0000"
      wIndex: spec_defined
      wLength: 0
    source_refs:
      - usb20_spec
    section_anchor: "USB 2.0 Specification Rev 2.0 §11.24.2"
    authority_level: normative_official
    claim_level: inferred
    evidence_status: review_required
    drift_status: clean
    notes: >
      bmRequestType=0x23 (D7=0 H2D, D6:5=01 class, D4:0=00011 other).
      wValue=0. wIndex=TT port number (spec_defined pending section review).
      Hub must complete ongoing split transactions before resetting.
      Only valid on HS hubs with an embedded Transaction Translator.

  - request_id: usb20_get_tt_state
    request_family: GET_TT_STATE
    request_name: GET_TT_STATE
    usb_version_scope:
      - usb20
    topic: class_specific_request
    recipient: hub
    applies_to: hub_with_tt_only
    setup:
      direction: device_to_host
      type: class
      recipient: other
      bRequest: GET_TT_STATE
      wValue: "0x0000"
      wIndex: spec_defined
      wLength: spec_defined
    source_refs:
      - usb20_spec
    section_anchor: "USB 2.0 Specification Rev 2.0 §11.24.2"
    authority_level: normative_official
    claim_level: inferred
    evidence_status: review_required
    drift_status: clean
    notes: >
      bmRequestType=0xA3 (D7=1 D2H, D6:5=01 class, D4:0=00011 other).
      wValue=0. wIndex=TT port/context (spec_defined).
      wLength=TT state data length (spec_defined — do not hardcode without section review).
      Returns TT diagnostic state data. Only valid on HS hubs with embedded TT.

  - request_id: usb20_stop_tt
    request_family: STOP_TT
    request_name: STOP_TT
    usb_version_scope:
      - usb20
    topic: class_specific_request
    recipient: hub
    applies_to: hub_with_tt_only
    setup:
      direction: host_to_device
      type: class
      recipient: other
      bRequest: STOP_TT
      wValue: "0x0000"
      wIndex: spec_defined
      wLength: 0
    source_refs:
      - usb20_spec
    section_anchor: "USB 2.0 Specification Rev 2.0 §11.24.2"
    authority_level: normative_official
    claim_level: inferred
    evidence_status: review_required
    drift_status: clean
    notes: >
      bmRequestType=0x23 (D7=0 H2D, D6:5=01 class, D4:0=00011 other).
      wValue=0. wIndex=TT port number (spec_defined pending section review).
      Stops processing split transactions on the TT.
      Only valid on HS hubs with an embedded Transaction Translator.
