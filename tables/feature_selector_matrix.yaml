matrix_id: usb_hub_feature_selector_matrix
scope:
  usb_versions:
    - usb20
  topic: feature_selector
status: draft
# Phase 3G: Feature selector minimum boundary for E-05
# Standard port selector range 0-22 defines the boundary that vendor selectors must not overlap.
# Hub selectors share numerical values with port selectors but target a different recipient.
# Entries remain claim_level=inferred; evidence_status is mixed reviewed / review_required.
entries:

  # ── Hub feature selectors ──────────────────────────────────────────────────
  # Used in SetFeature/ClearFeature with recipient=device (hub class requests).
  # Separate from port selector namespace.

  - selector_id: usb20_hub_c_hub_local_power
    selector_value: 0
    selector_name: C_HUB_LOCAL_POWER
    applies_to: hub
    request_usage:
      - ClearFeature
    source_refs:
      - usb20_spec
    section_anchor: "USB 2.0 Specification Rev 2.0 §11.24.2"
    authority_level: normative_official
    claim_level: inferred
    evidence_status: reviewed
    notes: "Reviewed linkage surface: hub-recipient ClearFeature selector corresponding to wHubChange bit 0 change condition. Selector boundary only; not behavioral verification."

  - selector_id: usb20_hub_c_hub_over_current
    selector_value: 1
    selector_name: C_HUB_OVER_CURRENT
    applies_to: hub
    request_usage:
      - ClearFeature
    source_refs:
      - usb20_spec
    section_anchor: "USB 2.0 Specification Rev 2.0 §11.24.2"
    authority_level: normative_official
    claim_level: inferred
    evidence_status: reviewed
    notes: "Reviewed linkage surface: hub-recipient ClearFeature selector corresponding to wHubChange bit 1 change condition. Selector boundary only; not behavioral verification."

  # ── Port feature selectors (standard range 0-22) ───────────────────────────
  # Used in SetFeature/ClearFeature/GetStatus with recipient=other (port class requests).
  # This is the E-05 boundary: vendor selectors must not overlap values 0-22.

  - selector_id: usb20_port_connection
    selector_value: 0
    selector_name: PORT_CONNECTION
    applies_to: port
    request_usage:
      - GetStatus_context
    source_refs:
      - usb20_spec
    section_anchor: "USB 2.0 Specification Rev 2.0 §11.24.2"
    authority_level: normative_official
    claim_level: inferred
    evidence_status: reviewed
    notes: "Reviewed GET_STATUS context-only linkage: read-only in wPortStatus bit 0. Not a direct SetFeature/ClearFeature target. Selector/status-field linkage only; not connection behavior verification."

  - selector_id: usb20_port_enable
    selector_value: 1
    selector_name: PORT_ENABLE
    applies_to: port
    request_usage:
      - SetFeature
      - ClearFeature
      - GetStatus_context
    source_refs:
      - usb20_spec
    section_anchor: "USB 2.0 Specification Rev 2.0 §11.24.2"
    authority_level: normative_official
    claim_level: inferred
    evidence_status: reviewed
    notes: "Reviewed linkage surface: port-recipient SetFeature/ClearFeature selector within the standard port selector namespace. Selector boundary only; not PORT_ENABLE state-machine verification."

  - selector_id: usb20_port_suspend
    selector_value: 2
    selector_name: PORT_SUSPEND
    applies_to: port
    request_usage:
      - SetFeature
