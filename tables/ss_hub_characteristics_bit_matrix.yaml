matrix_id: usb3_ss_hub_characteristics_bit_matrix
version: "0.1"
description: >
  wHubCharacteristics bit-group semantic governance for USB 3.x SuperSpeed hub descriptor.
  Covers the 4 defined bit groups and the reserved high-bit boundary.
  Scope: bit group name, bit range, and value encoding identity only.
  USB 3.x hubs have no Transaction Translator; TT Think Time bits are absent.
  Port Indicators occupies bit 5 (vs bit 7 in USB 2.0).
  Does not claim descriptor dump correctness, firmware behavior verification,
  or electrical/power behavior.
spec_family: usb3
verified_gate: PARTIAL
scope:
  usb_versions:
    - usb_3_2
  topic: ss_hub_descriptor_characteristics

entries:
  - id: usb3_ss_whc_power_switching
    field: wHubCharacteristics
    bit_range: "1:0"
    namespace: hub_descriptor_characteristics
    semantic_group: power_switching
    claim_level: verified
    evidence_status: reviewed
    source_refs:
      - usb32_spec
    section_anchor: "USB 3.2 Specification §10.14.2 Table 10-10"
    value_encoding:
      "00": ganged_power_switching
      "01": individual_port_power_switching
      "10": no_power_switching
      "11": no_power_switching
    evidence:
      verification_packet: evidence/entry_verification_packets/usb3/ss_whc_usb3_ss_whc_power_switching.yaml
      verified_scope: bit_group_name_value_encoding_identity_only
    non_claims:
      - Does not verify SET_FEATURE(PORT_POWER) firmware behavior.
      - Does not verify per-port power sequencing or timing.
      - Does not establish table-level verification.
    notes: >
      Defines whether all hub ports are powered together (ganged) or independently
      (per-port), or if no power switching is provided. USB 3.x hubs retain the
      same encoding as USB 2.0 for this field. Verified at bit-group name and
      value-encoding identity only.

  - id: usb3_ss_whc_compound_device
    field: wHubCharacteristics
    bit_range: "2"
    namespace: hub_descriptor_characteristics
    semantic_group: compound_device
    claim_level: verified
    evidence_status: reviewed
    source_refs:
      - usb32_spec
    section_anchor: "USB 3.2 Specification §10.14.2 Table 10-10"
    value_encoding:
      "0": not_compound_device
      "1": compound_device
    evidence:
      verification_packet: evidence/entry_verification_packets/usb3/ss_whc_usb3_ss_whc_compound_device.yaml
      verified_scope: bit_group_name_value_encoding_identity_only
    non_claims:
      - Does not verify compound device topology behavior or link routing.
      - Does not verify DeviceRemovable bitmap interpretation.
      - Does not establish table-level verification.
    notes: >
      Identifies whether the SuperSpeed hub is part of a compound device.
      Retained with identical encoding to USB 2.0. Verified at bit name and
      value-encoding identity only.

  - id: usb3_ss_whc_over_current_mode
    field: wHubCharacteristics
    bit_range: "4:3"
    namespace: hub_descriptor_characteristics
    semantic_group: over_current_protection
    claim_level: verified
    evidence_status: reviewed
    source_refs:
      - usb32_spec
    section_anchor: "USB 3.2 Specification §10.14.2 Table 10-10"
    value_encoding:
      "00": global_over_current_protection
      "01": individual_port_over_current_protection
      "10": no_over_current_protection
      "11": no_over_current_protection
    evidence:
      verification_packet: evidence/entry_verification_packets/usb3/ss_whc_usb3_ss_whc_over_current_mode.yaml
      verified_scope: bit_group_name_value_encoding_identity_only
    non_claims:
      - Does not verify over-current detection hardware behavior or thresholds.
      - Does not verify C_PORT_OVER_CURRENT change notification behavior.
      - Does not establish table-level verification.
    notes: >
      Defines over-current protection reporting granularity for USB 3.x hubs.
      00=hub-level OC events; 01=per-port OC events; 1x=no OC reporting.
      Same encoding as USB 2.0. Verified at bit-group name and value-encoding
      identity only.

  - id: usb3_ss_whc_port_indicators
    field: wHubCharacteristics
    bit_range: "5"
    namespace: hub_descriptor_characteristics
    semantic_group: port_indicators
    claim_level: verified
    evidence_status: reviewed
    source_refs:
      - usb32_spec
    section_anchor: "USB 3.2 Specification §10.14.2 Table 10-10"
    value_encoding:
      "0": port_indicators_not_supported
      "1": port_indicators_supported
    evidence:
      verification_packet: evidence/entry_verification_packets/usb3/ss_whc_usb3_ss_whc_port_indicators.yaml
      verified_scope: bit_group_name_value_encoding_identity_only
    non_claims:
      - Does not verify LED indicator hardware behavior or color encoding.
      - Does not verify SET_FEATURE(PORT_INDICATOR) routing.
      - Does not establish table-level verification.
    notes: >
      Indicates whether SuperSpeed hub hardware supports LED port indicators
      controllable via SET_FEATURE(PORT_INDICATOR). Occupies bit 5 in USB 3.x
      (bit 7 in USB 2.0 due to absence of TT Think Time bits[6:5] in USB 3.x).
      Verified at bit name and value-encoding identity only.

  - id: usb3_ss_whc_reserved_high
    field: wHubCharacteristics
    bit_range: "15:6"
    namespace: hub_descriptor_characteristics
    semantic_group: reserved_boundary
    claim_level: reviewed
    evidence_status: reviewed
    source_refs:
      - usb32_spec
    section_anchor: "USB 3.2 Specification §10.14.2 Table 10-10"
    value_encoding: {}
    notes: >
      Reserved bits; shall be zero per USB 3.2 specification. This entry closes
      the wHubCharacteristics high-byte namespace boundary for USB 3.x. Note that
      USB 2.0 reserved bits[15:8] whereas USB 3.x reserves bits[15:6] because
      TT Think Time bits[6:5] were removed (USB 3.x has no Transaction Translator).
      Permanent reviewed boundary — no behavioral semantic to verify.
