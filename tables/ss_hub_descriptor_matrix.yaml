matrix_id: usb3_ss_hub_descriptor_field_matrix
version: "0.2"
description: >
  USB 3.x SuperSpeed hub descriptor field governance.
  USB 3.2 Specification Rev 1.0, Section 10.14.2.1.
  Verified scope: descriptor field identity only (field name, offset, size).
  Does not claim descriptor dump correctness, firmware behavior, or
  electrical compliance.
spec_family: usb3
scope:
  usb_versions:
    - usb_3_2
  topic: ss_hub_descriptor_field

entries:
  - field_id: usb3_hub_desc_bLength
    offset: 0
    field_name: bLength
    size: 1 byte
    role: Total hub descriptor length (minimum 12 bytes, excluding DeviceRemovable).
    source_refs:
      - usb32_spec
    section_anchor: "USB 3.2 Specification Rev 1.0 §10.14.2.1 Table 10-3"
    claim_level: verified
    evidence_status: reviewed
    evidence:
      verification_packet: evidence/entry_verification_packets/usb3/ss_hub_descriptor_usb3_bLength.yaml
      verified_scope: descriptor_field_identity_only
    notes: "Verified: field name, offset, and size identity only."

  - field_id: usb3_hub_desc_bDescriptorType
    offset: 1
    field_name: bDescriptorType
    size: 1 byte
    role: SuperSpeed Hub Descriptor type.
    expected_value: "0x2A"
    source_refs:
      - usb32_spec
    section_anchor: "USB 3.2 Specification Rev 1.0 §10.14.2.1 Table 10-3"
    claim_level: verified
    evidence_status: reviewed
    evidence:
      verification_packet: evidence/entry_verification_packets/usb3/ss_hub_descriptor_usb3_bDescriptorType.yaml
      verified_scope: descriptor_field_identity_only
    notes: "Verified: 0x2A value boundary identity only. Distinguishes SS from USB 2.0 (0x29)."

  - field_id: usb3_hub_desc_bNbrPorts
    offset: 2
    field_name: bNbrPorts
    size: 1 byte
    role: Number of downstream-facing ports; maximum 15.
    source_refs:
      - usb32_spec
    section_anchor: "USB 3.2 Specification Rev 1.0 §10.14.2.1 Table 10-3"
    claim_level: verified
    evidence_status: reviewed
    evidence:
      verification_packet: evidence/entry_verification_packets/usb3/ss_hub_descriptor_usb3_bNbrPorts.yaml
      verified_scope: descriptor_field_identity_only
    notes: "Verified: field name, offset, and size identity only."

  - field_id: usb3_hub_desc_wHubCharacteristics
    offset: 3
    field_name: wHubCharacteristics
    size: 2 bytes
    role: >
      Hub characteristic bit field. Bits[1:0]=power switching mode,
      bit[2]=compound device, bits[4:3]=OC mode, bit[5]=port indicators.
      No TT Think Time field (SS hubs have no TT). Bits[15:6] reserved.
    source_refs:
      - usb32_spec
    section_anchor: "USB 3.2 Specification Rev 1.0 §10.14.2.1 Table 10-3"
    claim_level: verified
    evidence_status: reviewed
    evidence:
      verification_packet: evidence/entry_verification_packets/usb3/ss_hub_descriptor_usb3_wHubCharacteristics.yaml
      verified_scope: descriptor_field_identity_only
    notes: "Verified: field name, offset, and size identity only. Bit-group details remain scaffold_reviewed."

  - field_id: usb3_hub_desc_bPwrOn2PwrGood
    offset: 5
    field_name: bPwrOn2PwrGood
    size: 1 byte
    role: Time from power-on to power-good, in units of 2ms.
    source_refs:
      - usb32_spec
    section_anchor: "USB 3.2 Specification Rev 1.0 §10.14.2.1 Table 10-3"
    claim_level: verified
    evidence_status: reviewed
    evidence:
      verification_packet: evidence/entry_verification_packets/usb3/ss_hub_descriptor_usb3_bPwrOn2PwrGood.yaml
      verified_scope: descriptor_field_identity_only
    notes: "Verified: field name, offset, size, and unit boundary (2ms) identity only."

  - field_id: usb3_hub_desc_bHubContrCurrent
    offset: 6
    field_name: bHubContrCurrent
    size: 1 byte
    role: Maximum current consumed by hub controller in mA.
    source_refs:
      - usb32_spec
    section_anchor: "USB 3.2 Specification Rev 1.0 §10.14.2.1 Table 10-3"
    claim_level: verified
    evidence_status: reviewed
    evidence:
      verification_packet: evidence/entry_verification_packets/usb3/ss_hub_descriptor_usb3_bHubContrCurrent.yaml
      verified_scope: descriptor_field_identity_only
    notes: "Verified: field name, offset, and size identity only."

  - field_id: usb3_hub_desc_bHubDecLat
    offset: 7
    field_name: bHubDecLat
    size: 1 byte
    role: >
      Hub packet header decode latency in units of 0.1 μs.
      Root hubs report 0. Used by the system to calculate U1/U2 exit
      latency budget. Not present in USB 2.0 hub descriptor.
    source_refs:
      - usb32_spec
    section_anchor: "USB 3.2 Specification Rev 1.0 §10.14.2.1 Table 10-3"
    claim_level: verified
    evidence_status: reviewed
    evidence:
      verification_packet: evidence/entry_verification_packets/usb3/ss_hub_descriptor_usb3_bHubDecLat.yaml
      verified_scope: descriptor_field_identity_only
    notes: "Verified: field name, offset, size, and unit (0.1μs) identity only. USB 3.x-only field."

  - field_id: usb3_hub_desc_wHubDelay
    offset: 8
    field_name: wHubDelay
    size: 2 bytes
    role: >
      Average delay added by the hub in nanoseconds. Used by xHCI to
      calculate the allowed U1/U2 entry latency budget. Not present in
      USB 2.0 hub descriptor.
    source_refs:
      - usb32_spec
    section_anchor: "USB 3.2 Specification Rev 1.0 §10.14.2.1 Table 10-3"
    claim_level: verified
    evidence_status: reviewed
    evidence:
      verification_packet: evidence/entry_verification_packets/usb3/ss_hub_descriptor_usb3_wHubDelay.yaml
      verified_scope: descriptor_field_identity_only
    notes: "Verified: field name, offset, size, and unit (ns) identity only. USB 3.x-only field."

  - field_id: usb3_hub_desc_DeviceRemovable
    offset: 10
    field_name: DeviceRemovable
    size: variable
    role: >
      Bit-per-port bitmap. Bit N=1 means port N+1 is non-removable.
      Variable length based on bNbrPorts. Same semantics as USB 2.0,
      but USB 3.x does not include the PortPwrCtrlMask field.
    source_refs:
      - usb32_spec
    section_anchor: "USB 3.2 Specification Rev 1.0 §10.14.2.1 Table 10-3"
    claim_level: verified
    evidence_status: reviewed
    evidence:
      verification_packet: evidence/entry_verification_packets/usb3/ss_hub_descriptor_usb3_DeviceRemovable.yaml
      verified_scope: descriptor_field_identity_only
    notes: "Verified: field name, offset, and bit-per-port layout identity only. PortPwrCtrlMask absent noted."
