matrix_id: usb20_transaction_translator_matrix
scope:
  usb_versions:
    - usb20
  topic: transaction_translator
status: draft
# USB 2.0 Transaction Translator reference surface.
# Reviewed TT boundary entries only; not split-transaction semantic verification.

entries:
  - tt_id: usb20_tt_type_single
    category: tt_type
    name: Single TT
    related_field: wHubCharacteristics
    value: single_tt
    role: One Transaction Translator is shared across downstream ports.
    applies_to: high_speed_hub_with_embedded_tt
    source_refs:
      - usb20_spec
    section_anchor: "USB 2.0 Specification Rev 2.0 §11.17-11.18"
    authority_level: normative_official
    claim_level: verified
    evidence_status: reviewed
    drift_status: clean
    escalation_refs:
      - E-06
      - E-07
    notes: "Reviewed TT type boundary only; not a project-fact claim about a specific hub implementation."

