manifest_id: usb20_hub_class_request_manifest
manifest_version: "0.1"
export_type: governed_table_reference

# DEPRECATED: This manifest is superseded by exports/hub_governed_surface_manifest.yaml
# which covers all USB 2.0 and USB 3.x governed matrices (12 tables total).
# This file is retained for backward compatibility. New consumers should use
# hub_governed_surface_manifest.yaml instead.
#
# Authority ceiling: spec_reference_only
# See: docs/local_governance_freeze_point.md

authority_surface:
  topic: class_specific_request
  usb_version_scope:
    - usb20
  table_path: tables/class_request_matrix.yaml
  schema_path: schemas/class_request_matrix_schema.json
  validator_path: scripts/validate_class_request_matrix.py

claim_ceiling:
  default: spec_reference_only
  cannot_establish:
    - firmware_behavior
    - project_specific_truth
    - observed_device_behavior
    - vendor_specific_behavior

consumer_usage:
  intended_for:
    - lookup_usb20_hub_class_request_setup
  must_not:
    - treat_spec_reference_as_project_fact
    - override_project_evidence
    - infer_firmware_support_from_spec_presence

evidence_state:
  claim_level: inferred
  evidence_status: review_required
  semantic_pdf_verification: false

governed_tables:
  - id: usb20_escalation_trigger_matrix
    path: tables/escalation_trigger_matrix.yaml
  - id: usb20_hub_descriptor_field_matrix
    path: tables/hub_descriptor_matrix.yaml
  - id: usb20_transaction_translator_matrix
    path: tables/transaction_translator_matrix.yaml
  - id: usb_hub_class_request_matrix
    path: tables/class_request_matrix.yaml
  - id: usb_hub_feature_selector_matrix
    path: tables/feature_selector_matrix.yaml
  - id: usb20_hub_port_status_bit_matrix
    path: tables/port_status_bit_matrix.yaml
