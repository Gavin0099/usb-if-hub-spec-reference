  quoted_surface_summary: >
    wHubCharacteristics bits[1:0] define the Logical Power Switching Mode.
    00=Ganged power switching (all ports switched together);
    01=Individual (per-port) power switching;
    1x=No power switching available.
    Documented at USB 2.0 §11.23.2.1 Table 11-13.
  reviewer_note: >
    Reviewed for bit-group name, bit range [1:0], and value-encoding identity only.
    Does not claim SET_FEATURE(PORT_POWER) behavior or per-port power delivery verification.

