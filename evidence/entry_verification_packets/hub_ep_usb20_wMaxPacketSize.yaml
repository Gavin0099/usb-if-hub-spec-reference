  quoted_surface_summary: >
    wMaxPacketSize for hub status-change endpoint: minimum size = ceil((bNbrPorts+1)/8)
    bytes. For 1-7 ports: 1 byte; for 8-15 ports: 2 bytes. Must accommodate
    1 status bit per downstream port plus 1 hub-level bit. Documented at USB 2.0 §11.15.1.
