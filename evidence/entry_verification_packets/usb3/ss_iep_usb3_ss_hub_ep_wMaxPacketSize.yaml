  quoted_surface: reviewer_paraphrase_only
  quoted_surface_summary: >
    USB 3.2 Section 10.15.1 specifies the minimum wMaxPacketSize for the
    SuperSpeed hub status-change endpoint as sufficient to carry status change
    bits for the hub itself and all downstream ports. The minimum size is
    ceil((bNbrPorts + 1) / 8) bytes, where the +1 accounts for the hub's own
    status bit. This calculation is identical to the USB 2.0 requirement.
  reviewer_note: >
    Reviewed for field identity only: field name wMaxPacketSize, minimum size
    calculation (ceil((bNbrPorts+1)/8)), and port-count linkage. Does not verify
    firmware packet-size assignment correctness, runtime packet delivery,
    or flow control behavior.

review_checklist:
