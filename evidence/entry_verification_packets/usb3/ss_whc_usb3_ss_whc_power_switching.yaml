  quoted_surface: reviewer_paraphrase_only
  quoted_surface_summary: >
    USB 3.2 Section 10.14.2 Table 10-10 defines wHubCharacteristics bits[1:0]
    as the Hub Power Switching Mode field for SuperSpeed hubs. Encoding: 00=ganged
    power switching, 01=individual port power switching, 1x=no power switching.
    This field retains the same encoding as the USB 2.0 equivalent.
  reviewer_note: >
    Reviewed for bit group identity only: field name wHubCharacteristics,
    bit range bits[1:0], semantic group power_switching, and value encoding
    (00/01/1x). Does not verify SET_FEATURE(PORT_POWER) firmware behavior,
    per-port power sequencing, timing, or hardware compliance.

review_checklist:
  - Confirm §10.14.2 Table 10-10 is the correct USB 3.x wHubCharacteristics surface.
  - Confirm bits[1:0] encode Hub Power Switching Mode.
  - Confirm encoding: 00=ganged, 01=individual, 1x=no power switching.
  - Confirm no power sequencing, timing, or firmware behavior is claimed.

