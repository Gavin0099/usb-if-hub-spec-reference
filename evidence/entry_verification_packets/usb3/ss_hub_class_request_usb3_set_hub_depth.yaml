  quoted_surface: reviewer_paraphrase_only
  quoted_surface_summary: >
    USB 3.2 Section 10.14.2 defines SET_HUB_DEPTH (bRequest=0x0C) as a
    SuperSpeed-only request (bmRequestType=0x20, wValue=hub_depth, wLength=0).
    Presence and requiredness: mandatory for all SS hubs. The xHCI must issue
    this request before addressing devices downstream of the hub.
    wValue carries the hub tier depth (0 for root hub or hub directly attached
    to root hub; maximum depth 5).
  reviewer_note: >
    Reviewed for request identity and requiredness only: request name
    SET_HUB_DEPTH, bRequest=0x0C, bmRequestType=0x20, SS-only mandatory.
    Does not verify xHCI topology runtime behavior, hub depth assignment
    algorithm, or firmware compliance.

