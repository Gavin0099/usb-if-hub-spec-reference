  quoted_surface_summary: >
    USB 3.2 Section 10.14.2 defines GET_PORT_ERR_COUNT (bRequest=0x0D) as a
    SuperSpeed-only request (bmRequestType=0xA0, wIndex=port_number, wLength=2).
    Presence and optionality: optional for SS hubs. Returns a 16-bit link
    error count for the specified port; counter resets to 0 on read.
    Used for link quality diagnostics; not required for enumeration.
