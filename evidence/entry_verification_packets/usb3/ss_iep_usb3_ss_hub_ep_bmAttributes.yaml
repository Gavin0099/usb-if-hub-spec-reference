  page: null
  document_ref:
    primary_source_id: usb32_spec
    fallback_source_id: archive_usb32_pdf
    authority_expectation: normative_official_preferred
  quoted_surface: reviewer_paraphrase_only
  quoted_surface_summary: >
    USB 3.2 Section 10.15.1 specifies the SuperSpeed hub status-change endpoint
    as an Interrupt endpoint. bmAttributes bits[1:0] must be 0b11 (Interrupt
    transfer type). Bits[7:2] are reserved/zero for non-isochronous SuperSpeed
    endpoints. This transfer-type constraint is identical to the USB 2.0 hub
    interrupt endpoint bmAttributes requirement.
  reviewer_note: >
    Reviewed for field identity only: field name bmAttributes, transfer type
    constraint (bits[1:0]=0b11, Interrupt). Does not verify USB 3.x interrupt
    endpoint burst behavior, stream behavior, firmware bmAttributes assignment,
    or any runtime transfer behavior.

review_checklist:
  - Confirm §10.15.1 is the correct USB 3.x hub interrupt endpoint surface.
  - Confirm bmAttributes bits[1:0]=0b11 specifies Interrupt transfer type.
  - Confirm no burst, stream, or runtime transfer behavior is claimed.

