  quoted_surface_summary: >
    USB 3.2 Section 10.14.2.1 defines DeviceRemovable at offset 10, variable
    size. Bit N=1 means port N+1 is non-removable. Same semantics as USB 2.0.
    Note: USB 3.x hub descriptor does not include a PortPwrCtrlMask field
    (present in USB 2.0 descriptor).
  reviewer_note: >
    Reviewed for descriptor field identity only: field name, offset=10,
