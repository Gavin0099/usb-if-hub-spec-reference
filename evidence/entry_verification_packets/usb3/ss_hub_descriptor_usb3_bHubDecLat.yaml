  quoted_surface: reviewer_paraphrase_only
  quoted_surface_summary: >
    USB 3.2 Section 10.14.2.1 defines bHubDecLat at offset 7, size 1 byte.
    Represents the hub's packet header decode latency in units of 0.1μs.
    Root hubs report 0. This field is new in USB 3.x and not present in the
    USB 2.0 hub descriptor.
  reviewer_note: >
    Reviewed for descriptor field identity only: field name, offset=7, size=1B,
    unit boundary (0.1μs). The narrow claim is that bHubDecLat exists at this
    position with this unit. Does not claim U1/U2 exit latency calculation
    behavior or xHCI internal handling.

