  quoted_surface: reviewer_paraphrase_only
  quoted_surface_summary: >
    USB 3.2 Section 10.15.1 specifies bInterval for the SuperSpeed hub
    status-change endpoint using microframe-based encoding: bInterval value
    1–16 maps to a polling period of 2^(bInterval-1) × 125 microseconds.
    This is identical to the USB 2.0 High-Speed encoding. USB 3.x does not
    use the direct-millisecond encoding that applies to USB 2.0 Full-Speed
    and Low-Speed hubs.
  reviewer_note: >
    Reviewed for field identity only: field name bInterval, encoding unit
    (125 μs microframe), valid range (1–16), and formula (2^(bInterval-1)×125μs).
    Does not verify actual host scheduling, polling latency, interrupt delivery
    timing, or firmware bInterval assignment correctness.

review_checklist:
  - Confirm §10.15.1 is the correct USB 3.x hub interrupt endpoint surface.
  - Confirm bInterval uses microframe encoding: 2^(bInterval-1) × 125 μs.
  - Confirm valid range is bInterval 1–16.
  - Confirm USB 3.x does not use direct-ms encoding.
  - Confirm no scheduling, latency, or firmware behavior is claimed.

verification_scope:
