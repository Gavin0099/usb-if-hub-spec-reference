  quoted_surface: reviewer_paraphrase_only
  quoted_surface_summary: >
    USB 3.2 Section 10.14.2 defines GET_DESCRIPTOR (bRequest=0x06) addressed
    to the hub recipient (bmRequestType=0xA0, wValue=0x2A00). The high byte
    of wValue 0x2A is the SuperSpeed Hub Descriptor type; differs from USB
    2.0 (0x29). Returns the SS hub descriptor.
  reviewer_note: >
    Reviewed for request linkage identity only: request name GET_DESCRIPTOR,
    bRequest=0x06, hub recipient, bmRequestType=0xA0, descriptor type 0x2A.
    Does not verify descriptor content correctness or hub configuration.

review_checklist:
  - Confirm Section 10.14.2 is the correct SS hub class request surface.
  - Confirm GET_DESCRIPTOR is bRequest=0x06 for hub recipient.
  - Confirm bmRequestType=0xA0 (device-to-host, class, device).
  - Confirm wValue high byte 0x2A is the SS hub descriptor type.
  - Confirm no descriptor content semantics are claimed.

verification_scope:
  claim: request_linkage_identity_only
  excludes:
