  quoted_surface_summary: >
    USB 3.2 Section 10.14.2.6 Table 10-11 defines wPortStatus bits[12:10]
    as PORT_SPEED: a 3-bit field encoding the current connection speed.
    Values: 000=undefined, 001=Full_Speed (12 Mbps), 010=Low_Speed (1.5 Mbps),
    011=High_Speed (480 Mbps), 100=SuperSpeed (5 Gbps),
    101=SuperSpeedPlus (10 Gbps), 110–111=Reserved.
  reviewer_note: >
