  quoted_surface_summary: >
    USB 3.2 Section 10.14.2.1 defines wHubCharacteristics at offset 3, size 2 bytes.
    Key USB 3.x differences from USB 2.0: Port Indicators bit at bit[5] (not bit[7]);
    no TT Think Time field (bits[9:8] absent); bits[15:6] reserved.
  reviewer_note: >
    Reviewed for descriptor field identity only: field name, offset=3, size=2B.
    The narrow claim notes the bit[5] Port Indicators position and absence of TT
    Think Time bits. Does not verify wHubCharacteristics values in any firmware.

review_checklist:
  - Confirm Section 10.14.2.1 is the correct USB 3.2 SS hub descriptor surface.
  - Confirm wHubCharacteristics is at offset 3, size 2 bytes.
  - Confirm Port Indicators is at bit[5] in USB 3.x (vs bit[7] in USB 2.0).
  - Confirm no TT Think Time field exists in USB 3.x wHubCharacteristics.

