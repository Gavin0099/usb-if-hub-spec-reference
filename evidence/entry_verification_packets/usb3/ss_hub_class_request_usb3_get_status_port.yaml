    USB 3.2 Section 10.14.2 defines GET_STATUS (bRequest=0x00) addressed to
    a port recipient (bmRequestType=0xA3, wIndex=port_number). Returns 4
    bytes: wPortStatus (2B) + wPortChange (2B). SS port status layout
    includes PORT_LINK_STATE and PORT_SPEED, which differ from USB 2.0.
