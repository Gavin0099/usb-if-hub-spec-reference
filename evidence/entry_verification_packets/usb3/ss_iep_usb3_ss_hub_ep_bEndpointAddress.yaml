  quoted_surface: reviewer_paraphrase_only
  quoted_surface_summary: >
    USB 3.2 Section 10.15.1 specifies the SuperSpeed hub status-change endpoint
    descriptor. bEndpointAddress encodes the endpoint address: bit 7 must be 1
    (IN direction), and bits[3:0] encode the endpoint number which is
    implementation-defined by hub firmware. This constraint is identical to the
    USB 2.0 hub interrupt endpoint address requirement.
  reviewer_note: >
    Reviewed for field identity only: field name bEndpointAddress, direction
    constraint (bit 7=1, IN), and endpoint number role (bits[3:0],
    implementation-defined). Does not verify firmware endpoint address assignment,
    enumeration order, or any runtime endpoint behavior.

review_checklist:
  - Confirm §10.15.1 is the correct USB 3.x hub interrupt endpoint surface.
  - Confirm bEndpointAddress direction constraint: bit 7=1 (IN direction).
  - Confirm endpoint number in bits[3:0] is implementation-defined.
  - Confirm no firmware assignment, enumeration, or runtime behavior is claimed.

