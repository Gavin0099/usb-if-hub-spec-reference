  quoted_surface_summary: >
    wHubCharacteristics bits[6:5] define the TT Think Time category.
    00=TT requires at most 8 FS bit times;
    01=TT requires at most 16 FS bit times;
    10=TT requires at most 24 FS bit times;
    11=TT requires at most 32 FS bit times.
    This entry adds the wHubCharacteristics bit-range linkage to the existing
    transaction_translator_matrix TT think-time entries.
    Documented at USB 2.0 §11.23.2.1 Table 11-13.
  reviewer_note: >
    Reviewed for bit-group name, bit range [6:5], and value-encoding identity only.
    TT behavioral semantics are covered in transaction_translator_matrix.
    Does not claim TT scheduling behavior or HS transaction timing verification.

