name: Governance Validation
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Two-tier CI:
#   fixture-smoke   ??required gate. Deterministic. No network. Protects validator logic.
#   advisory        ??informational. Real repo content. Does not block PRs.
#
# Authority ceiling: fixture-smoke certifies validator logic only.
#                    advisory certifies nothing ??receipts are evidence artifacts, not semantic correctness claims.
# See: docs/local_governance_freeze_point.md

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "tests/**"
      - "tables/**"
      - "exports/**"
      - "evidence/source_registry.yaml"
      - "contract/**"
      - "specs/**"
      - "wiki/**"
  pull_request:
    branches: [main]
    paths:
      - "scripts/**"
      - "tests/**"
      - "tables/**"
      - "exports/**"
      - "evidence/source_registry.yaml"
      - "contract/**"
      - "specs/**"
      - "wiki/**"
  workflow_dispatch:

jobs:
  # ???? Required gate ????????????????????????????????????????????????????????????????????????????????????????????????????????????????????
  # Runs all fixture smoke tests. These are deterministic and hit no network.
  # A failure here means validator logic has regressed ??block the PR.
  fixture-smoke:
    name: Fixture Smoke (Required)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Source registry fixture smoke
        run: python scripts/smoke_validate_source_registry_fixtures.py

      - name: Source reachability fixture smoke
        run: python scripts/smoke_validate_source_reachability_fixtures.py

      - name: USB signals fixture smoke
        run: python scripts/smoke_validate_usb_signals_fixtures.py

      - name: Wiki frontmatter fixture smoke
        run: python scripts/smoke_validate_wiki_frontmatter_fixtures.py

      - name: Drift monitor fixture smoke
        run: python scripts/smoke_usbif_drift_monitor_fixtures.py

      - name: Staleness impact fixture smoke
        run: python scripts/smoke_validate_staleness_impact_fixtures.py

      - name: Wiki source coverage fixture smoke
        run: python scripts/smoke_validate_wiki_source_coverage_fixtures.py

      - name: Class request matrix fixture smoke
        run: python scripts/smoke_validate_class_request_matrix_fixtures.py

      - name: Class request coverage fixture smoke
        run: python scripts/smoke_validate_class_request_coverage_fixtures.py

      - name: Feature selector matrix fixture smoke
        run: python scripts/smoke_validate_feature_selector_matrix_fixtures.py

      - name: Port status bit matrix fixture smoke
        run: python scripts/smoke_validate_port_status_bit_matrix_fixtures.py

      - name: Manifest access contract fixture smoke
        run: python scripts/smoke_validate_usb20_hub_class_request_manifest_fixtures.py

      - name: Table fingerprint fixture smoke
        run: python scripts/smoke_probe_table_fingerprint_fixtures.py

      - name: Wiki consistency fixture smoke
        run: python scripts/smoke_probe_wiki_consistency_fixtures.py

      - name: Entry verification precondition gate
        run: python scripts/precondition_gate.py --receipt-out evidence/validation_receipt_precondition_gate.json

      - name: Upload precondition gate receipt
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: precondition-gate-receipt
          path: evidence/validation_receipt_precondition_gate.json
          if-no-files-found: ignore

  # ???? Advisory job ??????????????????????????????????????????????????????????????????????????????????????????????????????????????????????
  # Runs real validators against actual repo content.
  # Each step uses continue-on-error so all validators run regardless of individual failures.
  # Results are uploaded as artifacts ??they are evidence records, not semantic correctness claims.
  # This job does NOT block PRs.
  #
  # NOT included: validate_source_reachability.py ??hits USB-IF network, unsuitable as CI gate.
  advisory-validation:
    name: Advisory Real Content Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: fixture-smoke
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Create receipt output directory
        run: mkdir -p ci-receipts

      - name: Wiki frontmatter validation
        continue-on-error: true
        run: |
          python scripts/validate_wiki_frontmatter.py \
            --dir specs/ \
            --receipt-out ci-receipts/wiki_frontmatter.json

      - name: Wiki source coverage validation
        continue-on-error: true
        run: |
          python scripts/validate_wiki_source_coverage.py \
            --source-registry evidence/source_registry.yaml \
            --wiki-dir specs/ \
            --receipt-out ci-receipts/wiki_source_coverage.json

      - name: Staleness impact validation
        continue-on-error: true
        run: |
          python scripts/validate_staleness_impact.py \
            --drift-events evidence/drift_events.jsonl \
            --source-registry evidence/source_registry.yaml \
            --staleness-rules contract/staleness_rules.yaml \
            --wiki-dir specs/ \
            --receipt-out ci-receipts/staleness_impact.json

      - name: USB2 reference navigation validation
        continue-on-error: true
        run: |
          python scripts/validate_usb2_reference_navigation.py \
            --zh-page specs/usb2.md \
            --en-page specs/en/usb2.md \
            --receipt-out ci-receipts/usb2_reference_navigation.json

      - name: USB2 topic cross-reference validation
        continue-on-error: true
        run: |
          python scripts/validate_usb2_topic_cross_references.py \
            --receipt-out ci-receipts/usb2_topic_cross_references.json

      - name: USB2 topic pair reachability validation
        continue-on-error: true
        run: |
          python scripts/validate_usb2_topic_pair_reachability.py \
            --receipt-out ci-receipts/usb2_topic_pair_reachability.json

      - name: Class request matrix validation
        continue-on-error: true
        run: |
          python scripts/validate_class_request_matrix.py \
            --matrix tables/class_request_matrix.yaml \
            --source-registry evidence/source_registry.yaml \
            --receipt-out ci-receipts/class_request_matrix.json

      - name: Class request coverage validation
        continue-on-error: true
        run: |
          python scripts/validate_class_request_coverage.py \
            --matrix tables/class_request_matrix.yaml \
            --receipt-out ci-receipts/class_request_coverage.json

      - name: Spec authority manifest validation
        continue-on-error: true
        run: |
          python scripts/validate_spec_authority_manifest.py \
            --manifest exports/usb20_hub_class_request_manifest.yaml \
            --receipt-out ci-receipts/spec_authority_manifest.json

      - name: Feature selector matrix validation
        continue-on-error: true
        run: |
          python scripts/validate_feature_selector_matrix.py \
            --matrix tables/feature_selector_matrix.yaml \
            --source-registry evidence/source_registry.yaml \
            --receipt-out ci-receipts/feature_selector_matrix.json

      - name: Port status bit matrix validation
        continue-on-error: true
        run: |
          python scripts/validate_port_status_bit_matrix.py \
            --matrix tables/port_status_bit_matrix.yaml \
            --receipt-out ci-receipts/port_status_bit_matrix.json

      - name: Manifest access contract validation
        continue-on-error: true
        run: |
          python scripts/validate_usb20_hub_class_request_manifest.py \
            --manifest exports/usb20_hub_class_request_manifest.yaml \
            --receipt-out ci-receipts/usb20_hub_class_request_manifest.json

      - name: Table fingerprint drift check
        continue-on-error: true
        run: |
          python scripts/probe_table_fingerprint.py \
            --mode check \
            --manifest exports/usb20_hub_class_request_manifest.yaml \
            --baseline-in evidence/table_fingerprint_baseline.jsonl \
            --receipt-out ci-receipts/table_fingerprint_drift.json

      - name: Wiki consistency probe ??class request matrix
        continue-on-error: true
        run: |
          python scripts/probe_wiki_consistency.py \
            --table tables/class_request_matrix.yaml \
            --name-field request_name \
            --page specs/hub_class_requests.md \
            --table-id class_request_matrix \
            --receipt-out ci-receipts/wiki_consistency_class_request_matrix.json

      - name: Wiki consistency probe ??port status bit matrix
        continue-on-error: true
        run: |
          python scripts/probe_wiki_consistency.py \
            --table tables/port_status_bit_matrix.yaml \
            --name-field name \
            --page specs/port_status_bits.md \
            --table-id port_status_bit_matrix \
            --receipt-out ci-receipts/wiki_consistency_port_status_bit_matrix.json

      - name: Wiki consistency probe ??feature selector matrix
        continue-on-error: true
        run: |
          python scripts/probe_wiki_consistency.py \
            --table tables/feature_selector_matrix.yaml \
            --name-field selector_name \
            --page specs/hub_class_requests.md \
            --table-id feature_selector_matrix \
            --receipt-out ci-receipts/wiki_consistency_feature_selector_matrix.json

      - name: Wiki QA probe ??hub class requests (observation-only, requires ANTHROPIC_API_KEY secret)
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/probe_wiki_qa.py \
            --page specs/hub_class_requests.md \
            --qa-spec tests/qa/hub_class_requests_qa.yaml \
            --receipt-out ci-receipts/wiki_qa_hub_class_requests.json

      - name: Upload advisory receipts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: advisory-validation-receipts
          path: ci-receipts/
          if-no-files-found: ignore
