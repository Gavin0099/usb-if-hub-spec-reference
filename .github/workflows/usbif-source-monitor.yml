name: USB-IF Source Monitor

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Run USB-IF source monitor
        run: |
          python monitor/usbif_source_monitor.py \
            --sources monitor/monitored_sources.yaml \
            --snapshots evidence/source_snapshots.jsonl \
            --drift-events evidence/drift_events.jsonl

      - name: Upload monitor evidence
        uses: actions/upload-artifact@v4
        with:
          name: usbif-source-monitor-evidence
          path: |
            evidence/source_snapshots.jsonl
            evidence/drift_events.jsonl
