schema_version: 1
title: Source Authority Levels
last_updated: 2026-05-30

authority_levels:
  normative_official:
    rank: 100
    allowed_for:
      - normative_claim
      - descriptor_field_definition
      - request_definition
      - status_bit_definition
      - required_behavior
      - version_delta

  official_validation:
    rank: 80
    allowed_for:
      - validation_expectation
      - compliance_observation
    forbidden_for:
      - sole_normative_definition

  official_index:
    rank: 50
    allowed_for:
      - source_discovery
      - document_lineage
    forbidden_for:
      - normative_claim

  community_reference:
    rank: 30
    allowed_for:
      - cross_check
      - explanation_aid
    forbidden_for:
      - final_authority_claim

  archive_fallback:
    rank: 20
    allowed_for:
      - historical_fallback
      - unavailable_official_document_backup
    forbidden_for:
      - primary_normative_claim_when_official_available

url_type_allowlist:
  normative_official:
    - official_document_page
    - official_pdf
    - official_addendum
  official_validation:
    - official_document_page
    - official_pdf
  official_index:
    - official_index_page
  community_reference:
    - community_wiki
    - community_page
    - github
  archive_fallback:
    - archive_mirror
    - archive_page
